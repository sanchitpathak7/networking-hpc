---
# GPU Infrastructure Snippets
# GB200 cluster · InfiniBand · NCCL · MPI · NVSHMEM
# Use these as copy-paste starting points — adjust hostnames/paths as needed.

# ─────────────────────────────────────────────────────────────────────────────
gpu_topology:
  description: "Check GPU topology, NVLink, and NUMA layout"
  commands:
    topo_matrix:       "nvidia-smi topo -m"
    nvlink_speed:      "nvidia-smi nvlink -s"
    nvlink_fabric_uuid: "nvidia-smi -q | grep -A 5 'Fabric'"
    gpu_fabric_guids:  "nvidia-smi -q | grep 'GPU Fabric GUID'"
    numa_hardware:     "numactl --hardware"
    numa_lscpu:        "lscpu | grep -E 'NUMA|Socket|Core|Thread'"
    numa_bind_example: "numactl --membind=3 python train.py  # run on GPU0's HBM (NUMA node 3)"

# ─────────────────────────────────────────────────────────────────────────────
kernel_modules:
  description: "Check loaded kernel modules relevant to GPU + RDMA"
  commands:
    nvidia_all:        "lsmod | grep nvidia"
    ib_rdma_all:       "lsmod | grep -E 'ib_|mlx5|rdma'"
    peermem_check:     "lsmod | grep nvidia_peermem"
    gdrdrv_check:      "lsmod | grep gdrdrv"
    check_dma_buf:     "NCCL_DEBUG=INFO ... 2>&1 | grep DMA-BUF"

# ─────────────────────────────────────────────────────────────────────────────
kernel_logs:
  description: "Kernel ring buffer — XID errors, driver messages, IB events"
  commands:
    xid_errors:        "dmesg | grep -i xid"
    nvidia_driver:     "dmesg | grep -i nvidia | tail -30"
    ib_events:         "dmesg | grep -i 'mlx5\\|infiniband\\|rdma' | tail -20"
    live_follow:       "dmesg -w"
    journalctl_imex:   "journalctl -u nvidia-imex --no-pager | tail -50"
    journalctl_dcgm:   "journalctl -u dcgm --no-pager | tail -30"

# ─────────────────────────────────────────────────────────────────────────────
infiniband:
  description: "InfiniBand fabric health and diagnostics"
  commands:
    port_state:        "ibstat"
    port_state_grep:   "ibstat | grep -E 'State|Physical|Rate|LID|SM lid'"
    dev_to_netdev:     "ibdev2netdev"
    fabric_scan:       "ibdiagnet"
    perf_counters:     "perfquery -x 0 mlx5_1 1"
    link_down_check:   "ibstat | grep -i down"

  bandwidth_test:
    description: "ib_write_bw — validates data-plane bandwidth between 2 nodes. Run server first."
    server: |
      ib_write_bw -d mlx5_1 -p 18515 --report_gbits
    client: |
      ib_write_bw -d mlx5_1 -p 18515 <server-ib-hostname> --report_gbits
    expected: ">390 Gb/s on NDR 400Gb (line rate = 400 Gb/s)"
    note: "Test each NIC pair: mlx5_1 through mlx5_4. One per GPU, different PCIe buses."

  multi_nic_test:
    description: "Test all 4 NICs simultaneously to catch per-NIC issues"
    server: |
      for nic in mlx5_1 mlx5_2 mlx5_3 mlx5_4; do
        ib_write_bw -d $nic -p $((18515 + ${nic##*_})) --report_gbits &
      done; wait
    client: |
      for nic in mlx5_1 mlx5_2 mlx5_3 mlx5_4; do
        ib_write_bw -d $nic -p $((18515 + ${nic##*_})) <server> --report_gbits &
      done; wait

# ─────────────────────────────────────────────────────────────────────────────
mnnvl_imex:
  description: "MNNVL fabric UUID and IMEX diagnostics (GB200-specific)"
  commands:
    imex_connectivity:    "nvidia-imex-ctl -N"
    fabric_state_all:     "nvidia-smi -q | grep -A 5 'Fabric'"
    fabric_guids:         "nvidia-smi -q | grep 'GPU Fabric GUID'"
    imex_log_errors:      "grep -iE 'error|clique|uuid|fabric|resource' /var/log/nvidia-imex.log | tail -30"
    imex_config:          "cat /etc/nvidia-imex/nodes_config.cfg"
    imex_restart:         "sudo systemctl restart nvidia-imex"
    imex_status:          "systemctl status nvidia-imex"
    imex_channels:        "ls -la /dev/nvidia-caps-imex-channels/"

  healthy_fabric_output: |
    Fabric
        State                             : Completed
        Status                            : Success
        CliqueId                          : 32766
        ClusterUUID                       : 7a4af5e1-06e4-6349-c4fe-63d71b7d9aa1
        Health
            Summary                       : Healthy

  broken_fabric_output: |
    Fabric
        State                             : Completed
        Status                            : Insufficient Resources   ← root cause
        CliqueId                          : 0
        ClusterUUID                       : 00000000-0000-0000-0000-000000000000

# ─────────────────────────────────────────────────────────────────────────────
nccl:
  description: "NCCL test commands and debug env vars"

  env_vars:
    debug_full:          "NCCL_DEBUG=INFO"
    debug_warnings:      "NCCL_DEBUG=WARN"
    ib_nics:             "NCCL_IB_HCA=mlx5_1,mlx5_2,mlx5_3,mlx5_4"
    exclude_eth:         "NCCL_SOCKET_IFNAME=^mlx5_0"
    p2p_workaround:      "NCCL_IGNORE_DISABLED_P2P=1"
    force_ring:          "NCCL_ALGO=Ring"
    force_tree:          "NCCL_ALGO=Tree"
    channels:            "NCCL_NCHANNELS=8"
    timeout:             "NCCL_TIMEOUT=60"

  all_reduce_2node:
    description: "Multi-node all-reduce test via mpirun (GB200, 2 nodes, 8 GPUs)"
    command: |
      mpirun --allow-run-as-root \
        --hostfile /etc/hostfile \
        -np 8 -npernode 4 \
        --map-by ppr:4:node --bind-to none \
        -x UCX_TLS=tcp,self \
        -x NCCL_DEBUG=INFO \
        --mca plm_rsh_agent "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
        --mca coll ^cuda \
        /opt/nccl-tests/build/all_reduce_perf -b 1G -e 8G -f 2 -g 1 \
        2>&1 | tee allreduce_debug.txt

  all_reduce_single_node:
    description: "Single-node test — isolate intra-node NVLink performance"
    command: |
      mpirun --allow-run-as-root \
        -np 4 -npernode 4 \
        --map-by ppr:4:node --bind-to none \
        -x UCX_TLS=tcp,self \
        -x NCCL_DEBUG=INFO \
        /opt/nccl-tests/build/all_reduce_perf -b 1G -e 8G -f 2 -g 1 \
        2>&1 | tee allreduce_single.txt

  debug_grep_transport: |
    # After running with NCCL_DEBUG=INFO, check which transport was selected:
    grep "Ring.*via" allreduce_debug.txt
    # P2P/NVL   = NVLink working
    # SHM       = P2P disabled (check fabric UUID)
    # NET/IB    = cross-node InfiniBand
    # NET/Socket = TCP fallback (IB not found — check NCCL_IB_HCA)

  debug_grep_uuid: |
    grep -i "MNNVL\|fabric\|uuid\|P2P\|WARN" allreduce_debug.txt | head -30

# ─────────────────────────────────────────────────────────────────────────────
mpi:
  description: "MPI process launch patterns"

  hostfile_format: |
    # /etc/hostfile
    gb200-compute-node-001 slots=4
    gb200-compute-node-000 slots=4

  mpirun_base: |
    mpirun --allow-run-as-root \
      --hostfile /etc/hostfile \
      -np 8 -npernode 4 \
      --map-by ppr:4:node --bind-to none \
      -x UCX_TLS=tcp,self \
      --mca plm_rsh_agent "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
      --mca coll ^cuda \
      <your_binary>

  key_flags:
    "-np 8":              "total ranks (= total GPUs)"
    "-npernode 4":        "ranks per node (= GPUs per node)"
    "--map-by ppr:4:node": "place 4 ranks per node"
    "--bind-to none":     "don't pin to CPU cores (CUDA handles GPU affinity)"
    "UCX_TLS=tcp,self":   "MPI uses TCP for control — avoids UAR error in VMs"
    "--mca coll ^cuda":   "disable CUDA-aware MPI collectives — let NCCL handle them"

# ─────────────────────────────────────────────────────────────────────────────
slurm:
  description: "Slurm job submission and cluster inspection"

  sbatch_nccl:
    description: "NCCL all-reduce via sbatch (note: srun --mpi=pmix can hang — prefer mpirun)"
    script: |
      #!/bin/bash
      #SBATCH --job-name=nccl-test
      #SBATCH --nodes=2
      #SBATCH --ntasks-per-node=4
      #SBATCH --gres=gpu:4
      #SBATCH --partition=gb200

      mpirun --allow-run-as-root \
        --hostfile $SLURM_JOB_NODELIST \
        -np 8 -npernode 4 \
        --map-by ppr:4:node --bind-to none \
        -x UCX_TLS=tcp,self \
        -x NCCL_DEBUG=INFO \
        --mca plm_rsh_agent "ssh -o StrictHostKeyChecking=no" \
        --mca coll ^cuda \
        /opt/nccl-tests/build/all_reduce_perf -b 1G -e 8G -f 2 -g 1 \
        2>&1 | tee allreduce_${SLURM_JOB_ID}.txt

  commands:
    cluster_state:    "sinfo"
    node_detail:      "scontrol show node <nodename>"
    my_jobs:          "squeue -u $USER"
    cancel_job:       "scancel <jobid>"
    interactive:      "salloc --nodes=2 --ntasks-per-node=4 --gres=gpu:4 --partition=gb200"
    quick_test:       "srun --nodes=2 --ntasks=2 hostname"

# ─────────────────────────────────────────────────────────────────────────────
dcgm:
  description: "DCGM GPU health monitoring"
  commands:
    discover:         "dcgmi discovery -l"
    health_check:     "dcgmi health -g 0 -c"
    live_metrics:     "dcgmi dmon -e 203,204,155,156,150"
    field_ids:
      203: "GPU utilization (%)"
      204: "Memory utilization (%)"
      155: "Power draw (W)"
      156: "Temperature (C)"
      150: "SM clock (MHz)"
    run_diagnostics:  "dcgmi diag -r 1"    # level 1 = quick, 3 = long

# ─────────────────────────────────────────────────────────────────────────────
failure_patterns:
  description: "Error signatures and their fixes"

  ucx_uar_segfault:
    error: |
      mlx5dv_devx_alloc_uar(device=mlx5_1, flags=0x0) type=WC failed: Cannot allocate memory
      Segmentation fault (signal 11) in libucs.so
    cause: "UCX trying to use IB NICs in VM — VF BAR memory too small"
    fix:   "Add -x UCX_TLS=tcp,self to mpirun"

  p2p_disabled:
    error: |
      NCCL WARN P2P is disabled between NVLINK connected GPUs 1 and 0.
      This should not be the case given their connectivity, and is probably due to a hardware issue.
    cause: "MNNVL fabric UUID = 0.0 — fabric manager hasn't provisioned this node into the NVLink clique"
    diagnose: |
      nvidia-smi -q | grep -A 4 "Fabric"
      # Status: Insufficient Resources = fabric manager provisioning issue (operator fix)
      # Status: Uninitialized = IMEX not running or degraded
    workaround: "NCCL_IGNORE_DISABLED_P2P=1 (uses SHM, degraded performance)"
    real_fix:   "Operator adds GPU Fabric GUIDs to fabric manager config, restarts fabric manager"

  remote_process_exited:
    error: |
      NCCL WARN socketProgress: Connection closed by remote peer
      Test NCCL failure: 'remote process exited or there was a network error'
    cause: "Secondary error — another node crashed first, this node lost the bootstrap connection"
    fix:   "Find which node threw the FIRST error. This error is consequence, not root cause."

  nccl_hang_large_messages:
    error: "Test produces output for small sizes then silently hangs"
    cause: "SHM transport exhausted /dev/shm (tmpfs), or IB congestion hit NCCL timeout"
    diagnose: |
      df -h /dev/shm             # check space
      NCCL_TIMEOUT=120 ...       # extend timeout to distinguish slow vs deadlock
      dmesg | grep -i xid        # check for GPU hardware errors
    fix:   "Fix root P2P issue (so SHM isn't used), or increase /dev/shm size"

  imex_no_interface:
    error: |
      ERROR: No matching network interface found for any IP addresses in nodes_config.cfg
    cause: "IMEX started before DHCP assigned IP to management interface (race condition on boot)"
    fix:   "sudo systemctl restart nvidia-imex (after confirming IP is assigned)"
    note:  "This may not be the root cause of Insufficient Resources — check fabric manager too"
